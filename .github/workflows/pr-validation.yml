name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Detect validation-relevant changes
        id: changes
        run: |
          CHANGED_FILES="$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }})"

          if echo "$CHANGED_FILES" | grep -E '^(content/|public/data/|scripts/|config/news\.schema\.json|config/approved-sources\.yaml|docs/canonical-json-format\.es\.md|docs/feed-workflow\.es\.md)'; then
            echo "run_feed_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_feed_check=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -E '^(src/data/|src/hooks/useArchiveEdition\.ts|src/hooks/usePulseData\.ts|scripts/live-feed-|scripts/archive-store\.mjs|scripts/run-playwright-api|e2e/api-mode\.spec\.ts|package\.json|package-lock\.json|playwright\.config\.ts|vite\.config\.ts)'; then
            echo "run_api_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_api_smoke=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check diff formatting
        run: git diff --check ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

      - name: Check published feed sync
        if: steps.changes.outputs.run_feed_check == 'true'
        run: npm run check:feed

      - run: npm run validate:feed
      - run: npm test

      - name: Install Playwright browser for API smoke
        if: steps.changes.outputs.run_api_smoke == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run API-mode smoke coverage
        if: steps.changes.outputs.run_api_smoke == 'true'
        run: npm run test:e2e:api -- api-mode.spec.ts

      - name: Build
        env:
          VITE_BASE_PATH: /quant-pulse/
          VITE_OG_IMAGE_URL: https://${{ github.repository_owner }}.github.io/quant-pulse/placeholder.svg
        run: npm run build
